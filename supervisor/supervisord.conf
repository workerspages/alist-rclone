[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid
loglevel=warn

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[unix_http_server]
file=/var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
stdout_logfile=/var/log/nginx-stdout.log
stderr_logfile=/var/log/nginx/error.log
priority=10

[program:alist]
command=/app/alist server --data /data/alist
autostart=true
autorestart=true
stdout_logfile=/var/log/alist.log
stderr_logfile=/var/log/alist.log
priority=20

[program:rclone]
command=/usr/bin/rclone rcd --rc-addr=127.0.0.1:5572 --rc-no-auth --config=/data/rclone/rclone.conf --cache-dir=/data/rclone/cache
autostart=true
autorestart=true
stdout_logfile=/var/log/rclone.log
stderr_logfile=/var/log/rclone.log
priority=30

[program:api]
command=node /app/server/index.js
autostart=true
autorestart=true
stdout_logfile=/var/log/api.log
stderr_logfile=/var/log/api.log
environment=NODE_ENV="production"
priority=40
